name: Verify DNS Changes

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22.4.1'

      - name: Verify content of the JSONs
        run: |
          node ./scripts/verify_jsons.js

      - name: Commit JSON auto-fixes (if any)
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add domains
            git commit -m "chore: auto-fix JSON structure"
            git push
          else
            echo "No JSON fixes to commit."
          fi

      - name: Install DNSControl
        run: |
          curl -sSL https://github.com/StackExchange/dnscontrol/releases/download/v4.12.5/dnscontrol_4.12.5_linux_amd64.tar.gz -o dnscontrol.tar.gz
          tar -xzf dnscontrol.tar.gz
          sudo mv dnscontrol /usr/local/bin/

      - name: Create credentials file
        run: |
          echo '{"gcore":{"TYPE":"GCORE","api_key":"$GCORE_API_KEY"}}' > ./scripts/creds.json
          
      - name: Run verification from DNSControl
        env:
          GCORE_API_KEY: ${{ secrets.GCORE_API_KEY }}
        run: |
          dnscontrol check --config scripts/dnsconfig.js
